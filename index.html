<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetMetrics | Speed Test</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--surface-color);
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text-muted);
        }

        .display {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
        }

        .speed-value {
            font-size: 5rem;
            font-weight: 800;
            line-height: 1;
            color: var(--accent-color);
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
            transition: color 0.3s ease;
        }

        .unit {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .status {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            height: 20px;
        }

        .btn {
            background-color: var(--accent-color);
            color: #0369a1;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.125rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background-color: #334155;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none;
        }

        .loader {
            position: absolute;
            width: 180px;
            height: 180px;
            border: 4px solid transparent;
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loader.active {
            opacity: 1;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NetMetrics</h1>
        
        <div class="display">
            <div class="loader" id="loader"></div>
            <div class="speed-value" id="speed-value">0.0</div>
            <div class="unit">Mbps</div>
        </div>

        <div class="status" id="status">Esperando inicio...</div>

        <button class="btn" id="start-btn">Iniciar Prueba</button>
    </div>

    <script>
        class NetworkAnalyzer {
            constructor(uiElements) {
                this.ui = uiElements;
                this.isTesting = false;
                
                this.testPayloadUrl = "https://upload.wikimedia.org/wikipedia/commons/3/3e/Tokyo_Sky_Tree_2012.JPG";
                this.payloadSizeBytes = 8192000; 
                this.iterations = 3;
            }

            init() {
                this.ui.startBtn.addEventListener('click', () => this.runDiagnostics());
            }

            async runDiagnostics() {
                if (this.isTesting) return;

                this.setUIState(true, "Conectando...");
                let totalSpeed = 0;

                try {
                    for (let i = 0; i < this.iterations; i++) {
                        this.ui.status.textContent = `Analizando... (${i + 1}/${this.iterations})`;
                        const speed = await this.measureDownload();
                        totalSpeed += speed;
                        this.ui.speedValue.textContent = speed.toFixed(1);
                    }

                    const averageSpeed = totalSpeed / this.iterations;
                    this.finalizeTest(averageSpeed);

                } catch (error) {
                    this.handleError(error);
                }
            }

            measureDownload() {
                return new Promise((resolve, reject) => {
                    const cacheBuster = `?t=${new Date().getTime()}`;
                    const downloadImage = new Image();
                    let startTime, endTime;

                    downloadImage.onload = () => {
                        endTime = new Date().getTime();
                        const durationInSeconds = (endTime - startTime) / 1000;
                        const bitsLoaded = this.payloadSizeBytes * 8;
                        const speedBps = bitsLoaded / durationInSeconds;
                        const speedMbps = speedBps / (1024 * 1024);
                        resolve(speedMbps);
                    };

                    downloadImage.onerror = () => {
                        reject(new Error("Fallo en la resolución del host o descarga interrumpida."));
                    };

                    startTime = new Date().getTime();
                    downloadImage.src = this.testPayloadUrl + cacheBuster;
                });
            }

            setUIState(isTesting, statusText) {
                this.isTesting = isTesting;
                this.ui.startBtn.disabled = isTesting;
                this.ui.loader.classList.toggle('active', isTesting);
                this.ui.status.textContent = statusText;
                if (isTesting) {
                    this.ui.speedValue.textContent = "0.0";
                    this.ui.speedValue.style.color = "var(--text-main)";
                }
            }

            finalizeTest(averageSpeed) {
                this.setUIState(false, "Prueba completada");
                this.ui.speedValue.textContent = averageSpeed.toFixed(1);
                this.ui.speedValue.style.color = "var(--accent-color)";
            }

            handleError(error) {
                this.setUIState(false, "Error de conexión");
                this.ui.speedValue.textContent = "ERR";
                this.ui.speedValue.style.color = "#ef4444";
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const uiElements = {
                speedValue: document.getElementById('speed-value'),
                status: document.getElementById('status'),
                startBtn: document.getElementById('start-btn'),
                loader: document.getElementById('loader')
            };

            const analyzer = new NetworkAnalyzer(uiElements);
            analyzer.init();
        });
    </script>
</body>
</html>
